<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Rock, paper, scissors</h1>

    <div class="choices">
        <button onclick="game('rock')">✊</button>
        <button onclick="game('paper')">✋</button>
        <button onclick="game('scissors')">✌️</button>
    </div><br>
    <div class="nowStats" id="userDisplay">Your choice: </div>
    <div class="nowStats" id="computerDisplay">Computer choice: </div>
    <div class="nowStats" id="resultDisplay">Game result: </div>
    
    <div class="nowStats">Your score: <span id="userScoreDisplay"></span></div>
    <div class="nowStats">Computer score: <span id="computerScoreDisplay"></span></div>

    <script src="index.js"></script>
</body>
</html>
