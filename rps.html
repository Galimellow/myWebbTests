<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New page Layout</title>
    <link rel="stylesheet" href="newLayout.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="navMenu">
        <nav class="pageNav">
            <ul>
                <li><a href="rps.html">ROCK PAPER SCISORS</a></li>
                <li><a href="pokemonAPI.html">POKEMON TRACKER</a></li>
                <li><a href="newLayout.html">NEW LAYOUT</a></li>
                <li><a href="index.html">HOME</a></li>
            </ul>
        </nav>
    </section>
    <section class="mainTitle">
        <h1>Rock, paper, scisors</h1>
        <p id="pageIndex" style="display: none">1</p>
    </section>
    <section class="blackBox">
        <div class="contentBox" style="text-align: center">
            <div class="choices">
                <button onclick="game('rock')">✊</button>
                <button onclick="game('paper')">✋</button>
                <button onclick="game('scissors')">✌️</button>
            </div><br>
            <div class="nowStats" id="userDisplay">Your choice: </div>
            <div class="nowStats" id="computerDisplay">Computer choice: </div>
            <div class="nowStats" id="resultDisplay">Game result: </div>
            
            <div class="nowStats">Your score: <span id="userScoreDisplay"></span></div>
            <div class="nowStats">Computer score: <span id="computerScoreDisplay"></span></div>

            <div id="movingBox">😊</div>

            <div class="movementArrow">
                <button id="up" onclick="move('u')">⬆️</button>
                <button id="down" onclick="move('d')">⬇️</button>
                <button id="left" onclick="move('l')">⬅️</button>
                <button id="right" onclick="move('r')">➡️</button>
            </div>
        </div>
        <div class="slideNavBox">
            <h2>Slides</h2><br>
            <h2>💠💠</h2>
            <br>
            <nav>
                <ul>
                    <li id="slide1"><a href="rps.html">Slide 1</a></li>
                </ul>
            </nav>
        </div>
    </section>
    <div class="pageNavBorderLeft"></div>

    <!--
    <div class="pageNavBorderRight"></div>
    -->

    <script src="rps.js"></script>
    <script src="newLayout.js"></script>
</body>
</html>
