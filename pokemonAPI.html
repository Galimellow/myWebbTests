<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon image retriever</title>
    <link rel="stylesheet" href="pokemonAPI.css">
</head>
<body>
    <div class="row" id="pokemonTracer">
        <div id="pokemonList">
            <span id="pokemonListButton">List Of Pokemon</span>
            <div id="listOfPokemon" style = "display: none"></div>
        </div>
        <div id="actualTracer">
            <div>
                <input type="text" id="pokemonName" placeholder="Enter Pokemon Name">
                <div id="pokemonThatStart">        
                    <div id="pokemonThatStartButton">
                        <span>List of Pokemon with these letters</span>
                    </div>
                    <div id="pokemonThatStartShow" style = "display: none"></div>
                </div>
            </div>
            <button onclick="fetchData()">Fetch Pokemon</button><br>

            <img src="" alt="Pokemon Image" id="pokemonImg"  style="display: none"><br>
            
            <p id="allData"></p><br>
        </div>
    </div>    
    
    <div id="pageNav">
        <a href="index.html" class="centered"><span class="pgBtns">PAGE 1</span></a>
        <a href="pokemonAPI.html" class="centered"><span class="pgBtns">POKEMON PAGE</span></a>
    </div>
    
    <script src="pokemonAPI.js"></script>
</body>
</html>
